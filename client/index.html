<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goovoiture — Location de voiture & vente auto au Maroc</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#141412" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Goovoiture" />

    <!-- SEO (French — updated per route by SeoHead) -->
    <meta name="description" content="Location de voiture et marketplace automobile au Maroc. Louez ou achetez votre voiture sur Goovoiture." />
    <meta name="robots" content="index, follow" />
    <meta property="og:locale" content="fr_MA" />
    <meta property="og:site_name" content="Goovoiture" />
    <meta property="og:title" content="Goovoiture — Location de voiture & vente auto au Maroc" />
    <meta property="og:description" content="Location de voiture et achat/vente de voitures au Maroc." />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Cloudinary upload widget -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register service worker (production only — dev HMR breaks with SW caching) -->
    <script>
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && !location.hostname.startsWith('192.168.')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
